<!DOCTYPE html>
<title>New Tab</title>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="dashboard.css">
    <script src="script.js"></script>
</head>

<body>
    <div id="info-bar">
        <input id="search-bar">
        <div id="bookmark-container" style="display: flex; margin-top: 2vh; height: 4vh; width: 59vw;">
            <div class="bookmark" name="https://einthusan.tv/movie/browse/?lang=tamil">Einthusan</div>
            <div class="bookmark" name="https://www.khanacademy.org/profile/me/courses">Khan Academy</div>
            <div class="bookmark" name="https://gogoanime.page/home">Gogoanime</div>
        </div>
    </div>
    <div id="widget-container">
        <div class="widget" id="einthusan-widget"></div>
        <div class="widget" id="weather-widget"></div>
        <div class="widget" id="clock-widget"></div>
        <div class="widget" id="battery-widget"></div>
    </div>
    <div id="account">
        <div id="email-widget" class="widget"></div>
        <div id="applet-container" class="widget">
            <img class="applet" name="https://mail.google.com/mail/u/0">
            <img class="applet" name="https://drive.google.com">
            <img class="applet" name="https://docs.google.com/document/u/0">
            <img class="applet" name="https://docs.google.com/presentation/u/0">
            <img class="applet" name="https://leetcode.com/">
            <img class="applet" name="https://github.com/Saarujan-Sathees">
            <img class="applet" name="https://stackoverflow.com/">
            <img class="applet" name="https://einthusan.tv/movie/browse/?lang=tamil">
            <img class="applet" name="https://www.khanacademy.org/profile/me/courses">
            <img class="applet" name="https://onedrive.live.com">
        </div>
    </div>
    <div id="context-menu">
        <div class="context-button" id="theme-toggle"><pre>◐</pre></div>
        <div class="context-button" id="background-change"><pre style="scale: 70%; line-height: 10vh; margin-bottom: 57px;">🎨&#xFE0E;</pre></div>
        <div class="context-button"></div>
        <div class="context-button"></div>
        <div class="context-button"></div>
        <div class="context-button"></div>
    </div>
    <div id="cursor" style="display: none;"></div>
</body>
